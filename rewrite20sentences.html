<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Перепеши предложения</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            padding: 20px;
            position: relative;
        }

        .header {
            text-align: center;
            position: absolute;
            top: 100px;
            width: 100%;
            max-width: 100%;
        }

        .title {
            font-size: clamp(1.5rem, 4vw, 1.8rem);
            font-weight: 400;
            margin-bottom: 8px;
        }

        .counter {
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            color: #666666;
            font-weight: 400;
        }

        .word-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 300px;
            justify-content: center;
            width: 90%;
            max-width: 1000px;
        }

        .current-word {
            font-size: clamp(1.6rem, 4.5vw, 2.8rem);
            font-weight: 700;
            margin-bottom: 106px;
            text-align: center;
            line-height: 1.2;
            max-width: 100%;
            white-space: nowrap;
        }

        .arrow {
            width: clamp(35px, 8vw, 45px);
            height: clamp(47px, 10vw, 60px);
            margin-bottom: 72px;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-8px);
            }
            60% {
                transform: translateY(-4px);
            }
        }

        .instruction-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 400px;
        }

        .space-hint {
            padding: 0;
            border: 2px solid #666;
            border-radius: 12px;
            background: transparent;
            color: #ccc;
            font-size: clamp(1rem, 3vw, 1.1rem);
            font-weight: 500;
            transition: transform 0.15s ease;
            min-width: 300px;
            width: 100%;
            max-width: 400px;
            height: clamp(48px, 8vw, 54px);
            line-height: 1.2;
            text-align: center;
            cursor: pointer;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .space-hint:hover {
            border-color: #888;
        }

        .button-hint {
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            color: #666666;
            font-weight: 400;
            text-align: center;
        }

        .home-link-container {
            position: fixed;
            bottom: 42px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            pointer-events: auto;
            text-align: center;
        }

        .home-link {
            color: #666666;
            text-decoration: none;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            transition: color 0.3s ease;
            display: block;
            white-space: nowrap;
        }

        .home-link:hover {
            color: #888888;
            text-decoration: underline;
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .completion-popup {
            background: white;
            color: #1A1A1A;
            padding: 50px 60px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            max-width: 90vw;
            width: 400px;
            text-align: center;
        }

        .completed {
            font-size: clamp(1rem, 2.6vw, 1.3rem);
            font-weight: 700;
            line-height: 1.2;
            white-space: nowrap;
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .header {
                top: 80px;
            }

            .word-container {
                width: 100%;
                max-width: 95vw;
            }

            .current-word {
                white-space: normal;
                font-size: clamp(1.4rem, 5vw, 1.8rem);
            }

            .space-hint {
                max-width: 320px;
                min-width: 280px;
            }

            .completion-popup {
                padding: 40px 40px;
                width: 85vw;
            }

            .home-link-container {
                bottom: 37px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Перепеши предложения</div>
        <div class="counter" id="counter">Осталось 10 предложений</div>
    </div>

    <div class="word-container" id="wordContainer">
        <svg class="arrow" viewBox="0 0 49 66" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M46.5 41.5L24.5 63.4295M24.5 63.4295L24.4293 63.5L2.5 41.5M24.5 63.4295L24.5 2.5M24.5 63.4295V63.5" stroke="#ccc" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="current-word" id="currentWord">Мост</div>
        <div class="instruction-panel">
            <div class="space-hint" id="spaceHint">Нажми пробел на клавиатуре</div>
            <div class="button-hint">Или нажми на эту кнопку</div>
        </div>
    </div>

    <div class="home-link-container">
        <a href="index.html" class="home-link">Вернуться к другим заданиям</a>
    </div>

    <script>
        const allWords = [
            'Стюардесса вышла из самолёта.', 'Листья выросли из почек.', 'Мама вставляет ключ в замок.',
            'Люди плавают в море.', 'Яблоки лежат в тарелке.', 'Корабль плывёт под мостом.',
            'Кот идёт возле подъезда.', 'Компьютер стоит под столом.', 'Полка висит на стене.',
            'Трамвай едет по рельсам.', 'Чашка стоит на столе.', 'Куртка висит на вешалке.',
            'Бабушка сидит на диване.', 'Машины едут по дороге.', 'Лодка плывёт по воде.',
            'Мальчик кушает за столом.', 'Мама моется в ванной.', 'Собака бежит по траве.',
            'Камень лежит на земле.', 'Коробка стоит под столом.', 'Люди идут по пешеходному переходу.',
            'Тапки лежат на полу.', 'Скейт лежит на балконе.', 'Наушники лежат на шкафу.',
            'Йогурт стоит в холодильнике.', 'Кроссовки стоят в коридоре.', 'Перчатки лежат в кармане.',
            'Люстра висит над головой.', 'Зубы находятся во рту.', 'Цветок стоит на подоконнике.',
            'Папа ушёл в магазин.', 'Девочка едет в лифте.', 'Мы сидим на скамейке.',
            'Я еду на велосипеде.', 'Птица сидит на ветке.', 'Карандаши лежат в пенале.',
            'Мальчик спрятался за занавеской.', 'Я жду маму около дома.', 'Муха сидит на стекле.',
            'Я держу фонарик в руке.', 'Люди едут в автобусе.', 'Бабушка поднимается по лестнице.',
            'Я иду по бордюру.', 'Малыш хлопает в ладоши.', 'Кот убегает от собаки.',
            'Я еду за мамой на самокате.', 'Бабушка убрала сок в холодильник.', 'Чайник стоит на плите.',
            'Рыба плавает в аквариуме.', 'Мяч катится по полу.', 'Урна стоит возле скамейки.',
            'Папа висит на турнике.', 'Часы висят на стене.', 'Рыбак стоит на берегу.',
            'Люди выходят из электрички.', 'Мы вышли из метро.', 'Мальчик перепрыгивает через лужи.',
            'Люди прячутся от дождя.', 'Я уронил карандаш на пол.', 'Мама одела наушники на голову.',
            'Мои носки лежат в шкафу.', 'Голуби сидят на проводах.', 'Мы гуляем рядом с прудом.',
            'Картина висит на стене.', 'У меня царапина на ноге.', 'Сушилка для белья стоит за дверью.',
            'Я ношу часы на руке.', 'Собака бежит за палкой.', 'Солнце ушло за облако.',
            'Я смотрю на звёзды.', 'Я катаюсь вокруг дома.', 'Беседка стоит между деревьев.',
            'Папа выглядывает из-за угла.', 'Мы переходим через дорогу.', 'Я положил линейку между листов.',
            'Девочка стоит рядом с собакой.', 'Я держу маму за руку.', 'Мяч укатился в кусты.',
            'Дети рисуют мелом на асфальте.', 'Люди идут по тротуарной плитке.', 'Я ползу на дерево.',
            'Кот спрятался под машиной.', 'Мальчик катится с горки.', 'Я иду по лужам в резиновых сапогах.',
            'Утки сидят на берегу.', 'Папа спускается по лестнице.', 'Дети ползают по сугробу.',
            'Мы идём в подземном переходе.', 'Мама вышла из магазина.', 'Машина выехала из гаража.'
        ];

        const SESSION_WORD_COUNT = 10;

        let currentIndex = 0;
        let shuffledWords = [];
        let spaceHintBtn;
        let wordContainer;
        let header;

        function pluralize(count) {
            if (count % 10 === 1 && count % 100 !== 11) {
                return 'предложение';
            } else if (count % 10 >= 2 && count % 10 <= 4 && (count % 100 < 10 || count % 100 >= 20)) {
                return 'предложения';
            } else {
                return 'предложений';
            }
        }

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getRandomSessionWords(totalWords, sessionCount) {
            const shuffled = shuffleArray(totalWords);
            return shuffled.slice(0, sessionCount);
        }

        function init() {
            shuffledWords = getRandomSessionWords(allWords, SESSION_WORD_COUNT);
            currentIndex = 0;
            spaceHintBtn = document.getElementById('spaceHint');
            wordContainer = document.getElementById('wordContainer');
            header = document.querySelector('.header');
            updateDisplay();
        }

        function updateDisplay() {
            const counter = document.getElementById('counter');
            const currentWord = document.getElementById('currentWord');

            const remaining = shuffledWords.length - currentIndex;
            counter.textContent = `Осталось ${remaining} ${pluralize(remaining)}`;

            if (currentIndex < shuffledWords.length) {
                currentWord.textContent = shuffledWords[currentIndex];
            } else {
                showCompletionPopup();
            }
        }

        function showCompletionPopup() {
            header.style.display = 'none';
            wordContainer.innerHTML = `
                <div class="popup-overlay">
                    <div class="completion-popup">
                        <div class="completed">Все задания выполнены!</div>
                    </div>
                </div>
            `;
        }

        function nextWord() {
            if (currentIndex < shuffledWords.length) {
                spaceHintBtn.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    spaceHintBtn.style.transform = '';
                }, 150);
                currentIndex++;
                updateDisplay();
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            init();

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    nextWord();
                }
            });

            spaceHintBtn.addEventListener('click', nextWord);

            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
